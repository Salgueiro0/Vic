<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff69b4">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("PWA Ativado! ✨"));
  }
</script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Oi meu amor 💖</h1>
            <p>Acesse seu presente:</p>
            
            <input type="text" id="username" placeholder="coloque o login">
            <input type="password" id="password" placeholder="coloque a senha">
            
            <button onclick="checkLogin()">Entrar</button>
            
            <div class="hint-section">
                <button class="hint-btn" onclick="showHint()">Precisa de uma dica? tem 3, mas aperta devagar, porque esta de boas de descobrir kkk</button>
                <p id="hint-text" class="hidden"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
