<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Meu Amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Para: Vic 💖</h1>
            <p>Acesse seu presente:</p>
            
            <input type="text" id="username" placeholder="Como eu te chamo?">
            <input type="password" id="password" placeholder="Nossa data (DDMMAAAA)">
            
            <button onclick="checkLogin()">Entrar</button>
            
            <div class="hint-section">
                <button class="hint-btn" onclick="showHint()">Precisa de uma dica?</button>
                <p id="hint-text" class="hidden"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
