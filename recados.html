<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Textinhos</title>
    <style>
        body { background-color: #fff0f5; padding: 20px; font-family: sans-serif; color: #333; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .form-box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ffb6c1; outline: none; font-size: 16px; resize: none; }
        .add-btn { background: #ff69b4; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .back-btn { background: none; color: #ff69b4; border: 1px solid #ff69b4; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; }
        .textinho-card { 
            background: #fff; padding: 15px; border-radius: 15px; margin: 15px 0; 
            text-align: left; border-right: 5px solid #ffb6c1; position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .autor { font-weight: bold; color: #ff69b4; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='home.html'">← Voltar</button>
        <h1>Mural de Textinhos 💌</h1>

        <div class="form-box">
            <input type="text" id="quem" placeholder="Quem está escrevendo? (Seu nome)" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ffb6c1;">
            <textarea id="texto" placeholder="Escreva algo fofo aqui..." rows="4"></textarea>
            <button class="add-btn" id="btnEnviar" onclick="enviarTextinho()">Enviar Coração ✨</button>
        </div>

        <div id="mural-list"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        window.onload = carregarTextinhos;

        async function carregarTextinhos() {
            const list = document.getElementById('mural-list');
            const { data, error } = await _supabase
                .from('textinhos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            list.innerHTML = '';
            data.forEach(t => {
                const curtidas = t.curtidas || 0;
                list.innerHTML += `
                    <div class="textinho-card" style="position: relative;">
                        <span class="autor">De: ${t.autor}</span>
                        <p>${t.mensagem}</p>
                        
                        <!-- D: Botão de Curtida com Corações -->
                        <div style="display: flex; align-items: center; margin-top: 10px; border-top: 1px dashed #ffb6c1; padding-top: 8px;">
                            <button onclick="curtirTextinho(${t.id}, this)" style="background: none; border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; padding: 4px 8px; border-radius: 12px; background-color: #fff0f5; transition: transform 0.2s, background-color 0.2s;">
                                💖 <span class="like-count" style="font-size: 12px; margin-left: 5px; color: #ff69b4; font-weight: bold;">${curtidas}</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // D: Incrementar curtidas no Supabase para a tabela 'textinhos' com verificação de segurança
        async function curtirTextinho(id, buttonEl) {
            const countEl = buttonEl.querySelector('.like-count');
            let currentLikes = parseInt(countEl.innerText) || 0;
            
            // Efeito visual instantâneo
            countEl.innerText = currentLikes + 1;
            buttonEl.style.transform = "scale(1.2)";
            buttonEl.style.backgroundColor = "#ffe4e1";
            setTimeout(() => {
                buttonEl.style.transform = "scale(1)";
            }, 200);

            try {
                // Busca o número atual de curtidas para somar 1 de forma consistente
                const { data, error: selectError } = await _supabase
                    .from('textinhos')
                    .select('curtidas')
                    .eq('id', id)
                    .single();

                if (selectError) throw selectError;

                let novosLikes = (data?.curtidas || 0) + 1;

                // Executa a atualização e exige a resposta da linha alterada (.select())
                const { data: updateData, error: updateError } = await _supabase
                    .from('textinhos')
                    .update({ curtidas: novosLikes })
                    .eq('id', id)
                    .select();

                if (updateError) throw updateError;

                // Se o update foi executado com sucesso mas retornou vazio, é o bloqueio por RLS do Supabase
                if (!updateData || updateData.length === 0) {
                    throw new Error("RLS_BLOCK");
                }

            } catch (err) {
                console.error("Erro ao curtir recado:", err);
                // Reverte o número na interface caso a gravação falhe
                countEl.innerText = currentLikes;
                buttonEl.style.backgroundColor = "#fff0f5";

                if (err.message === "RLS_BLOCK") {
                    alert("Atenção: A curtida não pôde ser salva! Você precisa ir até o SQL Editor no painel do seu Supabase e dar a permissão de UPDATE para a tabela 'textinhos'. 💕");
                } else if (err.message && (err.message.includes("column") || err.code === "PGRST204")) {
                    alert("Atenção: Para ativar as curtidas, você precisa criar uma coluna chamada 'curtidas' (tipo bigint ou integer, valor padrão 0) na tabela 'textinhos' no seu painel do Supabase! 💕");
                } else {
                    alert("Erro ao salvar curtida! Tente novamente.");
                }
            }
        }

        async function enviarTextinho() {
            const autor = document.getElementById('quem').value;
            const mensagem = document.getElementById('texto').value;

            if (!autor || !mensagem) return alert("Escreve o nome e a mensagem, vida! 💕");

            const { error } = await _supabase
                .from('textinhos')
                .insert([{ autor, mensagem }]);

            if (!error) location.reload();
            else alert("Erro ao enviar! Tente novamente.");
        }
    </script>
</body>
</html>
