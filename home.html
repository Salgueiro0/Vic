<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Estilos específicos para a Timeline */
        body { background-color: #fff0f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .timeline-item { 
            background: white; padding: 20px; border-radius: 15px; 
            margin: 20px 0; text-align: left; border-left: 5px solid #ff69b4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ffb6c1; }
        .add-btn { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nossa História 💖</h1>
        <p>"Cada dia ao seu lado é um novo capítulo."</p>

        <div class="form-box">
            <h3>Adicionar Memória</h3>
            <input type="text" id="titulo" placeholder="Título do momento">
            <input type="date" id="data">
            <textarea id="desc" placeholder="O que aconteceu?"></textarea>
            <button class="add-btn" onclick="salvarMomento()">Guardar ✨</button>
        </div>

        <div id="timeline-list">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://byujwlsvmahgyyjcssne.supabase.co';
        const supabaseKey = 'sb_publishable_wkXJxy14f7R5M5VOHLl5hg_-eSL3Ecg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Carregar momentos ao abrir a página
        window.onload = carregarMomentos;

        async function carregarMomentos() {
            const { data, error } = await _supabase
                .from('momentos')
                .select('*')
                .order('data_evento', { ascending: false });

            const list = document.getElementById('timeline-list');
            list.innerHTML = '';

            data.forEach(m => {
                list.innerHTML += `
                    <div class="timeline-item">
                        <small>${new Date(m.data_evento).toLocaleDateString('pt-BR', {timeZone: 'UTC'})}</small>
                        <h3>${m.titulo}</h3>
                        <p>${m.descricao}</p>
                    </div>
                `;
            });
        }

        async function salvarMomento() {
            const t = document.getElementById('titulo').value;
            const d = document.getElementById('data').value;
            const desc = document.getElementById('desc').value;

            const { error } = await _supabase
                .from('momentos')
                .insert([{ titulo: t, data_evento: d, descricao: desc }]);

            if (error) alert("Erro ao salvar!");
            else {
                alert("Memória salva! ❤️");
                location.reload();
            }
        }
    </script>
</body>
</html>
