<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História</title>
    <style>
        /* Mantendo seu estilo original */
        body { background-color: #fff0f5; padding: 20px; font-family: sans-serif; color: #333; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .timeline-item { 
            background: white; padding: 20px; border-radius: 15px; 
            margin: 20px 0; text-align: left; border-left: 5px solid #ff69b4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ffb6c1; outline: none; font-size: 16px; }
        .add-btn { background: #ff69b4; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .add-btn:hover { background: #ff1493; }
        .foto-preview { width: 100%; border-radius: 10px; margin-top: 10px; }
        input[type="file"] { border: none; background: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nossa História 💖</h1>
        <p>"Cada dia ao seu lado é um novo capítulo. Então porque não guardamos tudo?"</p>

        <div class="form-box">
            <h3>Adicionar Memória</h3>
            <input type="text" id="titulo" placeholder="Título do momento">
            <input type="date" id="data">
            <textarea id="desc" placeholder="O que aconteceu?" rows="3"></textarea>
            
            <div style="text-align: left; padding: 0 5%;">
                <label style="font-size: 12px; color: #ff69b4; font-weight: bold;">Escolha uma foto:</label><br>
                <input type="file" id="foto" accept="image/*">
            </div>
            
            <button class="add-btn" id="btnGuardar" onclick="salvarMomento()">Guardar ✨</button>
        </div>

        <div id="timeline-list">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://byujwlsvmahgyyjcssne.supabase.co';
        const supabaseKey = 'sb_publishable_wkXJxy14f7R5M5VOHLl5hg_-eSL3Ecg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = carregarMomentos;

        async function carregarMomentos() {
            const list = document.getElementById('timeline-list');
            const { data, error } = await _supabase
                .from('momentos')
                .select('*')
                .order('data', { ascending: false });

            if (error) {
                console.error("Erro ao carregar:", error);
                return;
            }

            list.innerHTML = '';
            data.forEach(m => {
                const imgHtml = m.imagem_url ? `<img src="${m.imagem_url}" class="foto-preview">` : '';
                const dataFormatada = m.data ? new Date(m.data).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : '';
                
                list.innerHTML += `
                    <div class="timeline-item">
                        <small style="color: #ff69b4; font-weight: bold;">${dataFormatada}</small>
                        <h3>${m.titulo || 'Sem título'}</h3>
                        <p>${m.descrição || 'Sem descrição'}</p> 
                        ${imgHtml}
                    </div>
                `;
            });
        }

        async function salvarMomento() {
            const btn = document.getElementById('btnGuardar');
            const file = document.getElementById('foto').files[0];
            const t = document.getElementById('titulo').value;
            const d = document.getElementById('data').value;
            const desc = document.getElementById('desc').value;

            if (!t || !d) {
                alert("Preencha pelo menos o título e a data! 💕");
                return;
            }

            btn.innerText = "Guardando...";
            btn.disabled = true;

            let urlPublica = null;

            try {
                // 1. Upload da Foto (Bucket: imagens)
                if (file) {
                    const nomeArquivo = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('imagens')
                        .upload(nomeArquivo, file);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = _supabase.storage.from('imagens').getPublicUrl(nomeArquivo);
                    urlPublica = urlData.publicUrl;
                }

                // 2. Insert na Tabela 'momentos'
                const { error: insertError } = await _supabase
                    .from('momentos')
                    .insert([{ 
                        titulo: t, 
                        data: d, 
                        descrição: desc, 
                        imagem_url: urlPublica 
                    }]);

                if (insertError) throw insertError;

                alert("Memória salva! ❤️");
                location.reload();

            } catch (err) {
                console.error("Erro completo:", err);
                alert("Erro ao salvar! Certifique-se de que as Policies de INSERT no Storage também estão ativas.");
                btn.innerText = "Guardar ✨";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
