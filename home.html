<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História</title>
    <style>
        /* Mantendo seu estilo original */
        body { background-color: #fff0f5; padding: 20px; font-family: sans-serif; color: #333; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .timeline-item { 
            background: white; padding: 20px; border-radius: 15px; 
            margin: 20px 0; text-align: left; border-left: 5px solid #ff69b4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ffb6c1; outline: none; font-size: 16px; }
        .add-btn { background: #ff69b4; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .add-btn:hover { background: #ff1493; }
        .foto-preview { width: 100%; border-radius: 10px; margin-top: 10px; }
        input[type="file"] { border: none; background: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- B: Header com botão de logout fofo -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0; font-size: 24px;">Nossa História 💖</h1>
            <button onclick="fazerLogout()" style="background: none; color: #ff69b4; border: 1px solid #ff69b4; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s;" onmouseover="this.style.backgroundColor='#ff69b4'; this.style.color='white';" onmouseout="this.style.backgroundColor='transparent'; this.style.color='#ff69b4';">Sair 🚪</button>
        </div>
        <p>"Cada dia ao seu lado é um novo capítulo. Então porque não guardamos tudo?"</p>

        <div class="form-box">
            <h3>Adicionar Memória</h3>
            <input type="text" id="titulo" placeholder="Título do momento">
            <input type="date" id="data">
            <textarea id="desc" placeholder="O que aconteceu?" rows="3"></textarea>
            
            <div style="text-align: left; padding: 0 5%;">
                <label style="font-size: 12px; color: #ff69b4; font-weight: bold;">Escolha uma foto:</label><br>
                <input type="file" id="foto" accept="image/*" onchange="mostrarPreview(this)">
                
                <!-- C: Container de Preview de Imagem -->
                <div id="preview-container" style="display: none; margin-top: 10px; text-align: center; position: relative;">
                    <img id="img-preview" class="foto-preview" style="max-height: 200px; object-fit: cover; border-radius: 10px;">
                    <button type="button" onclick="removerFoto()" style="position: absolute; top: 5px; right: 5px; background: rgba(255, 0, 0, 0.7); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; font-size: 12px;">X</button>
                </div>
            </div>
            
            <button class="add-btn" id="btnGuardar" onclick="salvarMomento()">Guardar ✨</button>
        </div>

        <div id="timeline-list">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        window.onload = carregarMomentos;

        // C: Exibe preview da imagem selecionada
        function mostrarPreview(input) {
            const container = document.getElementById('preview-container');
            const preview = document.getElementById('img-preview');
            const file = input.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                removerFoto();
            }
        }

        function removerFoto() {
            document.getElementById('foto').value = '';
            document.getElementById('preview-container').style.display = 'none';
            document.getElementById('img-preview').src = '';
        }

        // E: Função para comprimir imagem usando Canvas no lado do cliente
        function comprimirImagem(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Redimensiona mantendo proporção (máximo de 1200px de largura/altura)
                        const MAX_WIDTH = 1200;
                        const MAX_HEIGHT = 1200;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Converte para blob jpeg com 75% de qualidade
                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        }, 'image/jpeg', 0.75);
                    };
                };
            });
        }

        async function carregarMomentos() {
            const list = document.getElementById('timeline-list');
            const { data, error } = await _supabase
                .from('momentos')
                .select('*')
                .order('data', { ascending: false });

            if (error) {
                console.error("Erro ao carregar:", error);
                return;
            }

            list.innerHTML = '';
            data.forEach(m => {
                const imgHtml = m.imagem_url ? `<img src="${m.imagem_url}" class="foto-preview">` : '';
                const dataFormatada = m.data ? new Date(m.data).toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : '';
                const curtidas = m.curtidas || 0;
                
                list.innerHTML += `
                    <div class="timeline-item" style="position: relative;">
                        <small style="color: #ff69b4; font-weight: bold;">${dataFormatada}</small>
                        <h3>${m.titulo || 'Sem título'}</h3>
                        <p>${m.descrição || 'Sem descrição'}</p> 
                        ${imgHtml}
                        
                        <!-- D: Botão de Curtida com Corações -->
                        <div style="display: flex; align-items: center; margin-top: 15px; border-top: 1px dashed #ffb6c1; padding-top: 10px;">
                            <button onclick="curtirMomento(${m.id}, this)" style="background: none; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; padding: 5px 10px; border-radius: 15px; background-color: #fff0f5; transition: transform 0.2s, background-color 0.2s;">
                                💖 <span class="like-count" style="font-size: 14px; margin-left: 5px; color: #ff69b4; font-weight: bold;">${curtidas}</span>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // D: Incrementar curtidas no Supabase
        async function curtirMomento(id, buttonEl) {
            const countEl = buttonEl.querySelector('.like-count');
            let currentLikes = parseInt(countEl.innerText) || 0;
            
            // Efeito visual instantâneo
            countEl.innerText = currentLikes + 1;
            buttonEl.style.transform = "scale(1.2)";
            buttonEl.style.backgroundColor = "#ffe4e1";
            setTimeout(() => {
                buttonEl.style.transform = "scale(1)";
            }, 200);

            try {
                // Busca o número atual de curtidas para somar 1 de forma consistente
                const { data, error: selectError } = await _supabase
                    .from('momentos')
                    .select('curtidas')
                    .eq('id', id)
                    .single();

                if (selectError) throw selectError;

                let novosLikes = (data?.curtidas || 0) + 1;

                const { error: updateError } = await _supabase
                    .from('momentos')
                    .update({ curtidas: novosLikes })
                    .eq('id', id);

                if (updateError) throw updateError;

            } catch (err) {
                console.error("Erro ao curtir:", err);
                // Reverte número se falhar
                countEl.innerText = currentLikes;
                buttonEl.style.backgroundColor = "#fff0f5";

                if (err.message && (err.message.includes("column") || err.code === "PGRST204")) {
                    alert("Atenção: Para ativar as curtidas, você precisa criar uma coluna chamada 'curtidas' (tipo bigint ou integer, valor padrão 0) na tabela 'momentos' no seu painel do Supabase! 💕");
                } else {
                    alert("Erro ao salvar curtida! Tente novamente.");
                }
            }
        }

        async function salvarMomento() {
            const btn = document.getElementById('btnGuardar');
            let file = document.getElementById('foto').files[0];
            const t = document.getElementById('titulo').value;
            const d = document.getElementById('data').value;
            const desc = document.getElementById('desc').value;

            if (!t || !d) {
                alert("Preencha pelo menos o título e a data! 💕");
                return;
            }

            btn.innerText = "Guardando...";
            btn.disabled = true;

            let urlPublica = null;

            try {
                // E: Aplica compressão automática caso haja imagem
                if (file) {
                    btn.innerText = "Comprimindo imagem...";
                    file = await comprimirImagem(file);
                }

                // 1. Upload da Foto (Bucket: imagens)
                if (file) {
                    btn.innerText = "Enviando foto...";
                    const nomeArquivo = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('imagens')
                        .upload(nomeArquivo, file);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = _supabase.storage.from('imagens').getPublicUrl(nomeArquivo);
                    urlPublica = urlData.publicUrl;
                }

                // 2. Insert na Tabela 'momentos'
                btn.innerText = "Salvando no banco...";
                const { error: insertError } = await _supabase
                    .from('momentos')
                    .insert([{ 
                        titulo: t, 
                        data: d, 
                        descrição: desc, 
                        imagem_url: urlPublica 
                    }]);

                if (insertError) throw insertError;

                alert("Memória salva! ❤️");
                location.reload();

            } catch (err) {
                console.error("Erro completo:", err);
                alert("Erro ao salvar! Certifique-se de que as Policies de INSERT no Storage também estão ativas.");
                btn.innerText = "Guardar ✨";
                btn.disabled = false;
            }
        }
    </script>
    <div style="margin-bottom: 20px;">
    <button class="add-btn" onclick="window.location.href='recados.html'" style="background: #ffb6c1; color: #d02090;">
        Mural de Textinhos 💌
    </button>
</div>
</body>
</html>
